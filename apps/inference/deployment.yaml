---
# GPU inference workload deployment.
# Default image: inference-stub (apps/inference/stub/) — a lightweight HTTP server
# that proves Karpenter provisioning and KEDA scaling without requiring a real model.
#
# To build and push the stub:
#   docker build -t <your-registry>/inference-stub:latest apps/inference/stub/
#   docker push <your-registry>/inference-stub:latest
#
# Replace the image field below with your actual inference container when ready.
#
# NOTE: This base config targets GPU nodes. The dev overlay (environments/dev/inference/)
# patches affinity and resources to run on CPU nodes for cost-free architecture
# validation. Staging and production deploy this base config unchanged.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-pod
  labels:
    app: inference-pod
spec:
  replicas: 0  # Managed by KEDA — start at zero
  selector:
    matchLabels:
      app: inference-pod
  template:
    metadata:
      labels:
        app: inference-pod
    spec:
      # GPU scheduling: pods target the gpu NodePool via taint/toleration + affinity.
      # The dev overlay (environments/dev/inference/) overrides this to general nodes
      # for cost-free architecture validation without GPU quota.
      tolerations:
        - key: gpu
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload-type
                operator: In
                values:
                - gpu
      terminationGracePeriodSeconds: 120
      containers:
      - name: inference
        image: REGISTRY_PLACEHOLDER/inference-stub:latest  # replaced by scripts/setup.sh
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: 14Gi
            nvidia.com/gpu: "1"
        env:
        - name: MODEL_PATH
          value: /models/model.onnx
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  labels:
    app: inference-pod
spec:
  selector:
    app: inference-pod
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP
---
# Pod Disruption Budget — protect running replicas from voluntary eviction.
# minAvailable: 1 only blocks eviction when desired replicas >= 2; it does NOT
# interfere with KEDA scale-to-zero (replicas=0 desired → PDB has no effect).
# The dev overlay removes this PDB entirely since minReplicaCount=0 makes it redundant.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inference-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: inference-pod
