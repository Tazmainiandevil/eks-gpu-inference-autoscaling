apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: inference

resources:
  - deployment.yaml
  - scaledobject.yaml
  - servicemonitor.yaml

# Override the stub image without editing deployment.yaml directly.
# Set by scripts/setup.sh, or override manually:
#   kustomize edit set image REGISTRY_PLACEHOLDER/inference-stub=<your-registry>/inference-stub:latest
images:
  - name: REGISTRY_PLACEHOLDER/inference-stub
    newName: REGISTRY_PLACEHOLDER/inference-stub
    newTag: latest

commonLabels:
  app.kubernetes.io/name: inference
  app.kubernetes.io/component: gpu-workload
  managed-by: argocd
