apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      # Set by scripts/setup.sh (AWS_REGION env var, default eu-west-2).
      region: eu-west-2
      # No auth block needed — ESO picks up the IAM role automatically from the
      # EKS Pod Identity agent (169.254.170.23), the same mechanism Karpenter uses.
      # The role is bound via aws_eks_pod_identity_association in terraform/external-secrets.tf.
