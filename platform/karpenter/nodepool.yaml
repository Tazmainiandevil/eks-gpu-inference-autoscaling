apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  # Cluster-specific values below are patched by the environment overlay
  # (environments/{dev,staging,production}/karpenter/kustomization.yaml).
  # setup.sh does NOT touch this file — kustomize handles the substitution.
  role: "YOUR_CLUSTER_NAME-gpu-node-role"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "YOUR_CLUSTER_NAME"
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/YOUR_CLUSTER_NAME: owned
  tags:
    ManagedBy: "karpenter"
    Environment: "YOUR_ENV"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  template:
    metadata:
      labels:
        workload-type: general
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints: []  # No taints for general workloads
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3.large", "t3a.medium", "t3a.large"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
  limits:
    cpu: "20"
    memory: 80Gi
  disruption:
    consolidationPolicy: WhenEmpty
    # 3m gives enough observation window to see scaling in action during a demo.
    # Override per environment: staging=30m (environments/staging/karpenter/),
    # production=2h (environments/production/karpenter/ — preserves warm image cache).
    consolidateAfter: 3m
    budgets:
    - nodes: "10%"
      reasons:
      - "Underutilized"
      - "Empty"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu
spec:
  template:
    metadata:
      labels:
        workload-type: gpu
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: gpu
          value: "true"
          effect: NoSchedule
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          # g4dn: T4   16GB VRAM — models up to ~7B params in fp16  (~$0.74/hr spot)
          # g5:   A10G 24GB VRAM — models up to ~13B params in fp16  (~$0.76/hr spot)
          # g6:   L4   24GB VRAM — newer than g5, similar VRAM, lower cost (~$0.60/hr spot)
          #            g6 availability in eu-west-2 is limited; Karpenter falls back to g4dn/g5
          # Production overlay adds p4de for 80GB burst; see environments/production/karpenter/
          values: ["g4dn.xlarge", "g4dn.2xlarge", "g5.xlarge", "g5.2xlarge", "g6.xlarge", "g6.2xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]  # spot preferred; on-demand fallback if spot exhausted
  limits:
    cpu: "64"
    memory: 256Gi
    nvidia.com/gpu: "8"  # Hard cap — prevents unbounded GPU node provisioning
  disruption:
    consolidationPolicy: WhenEmpty
    # 3m base. Override per environment: staging=30m, production=2h.
    consolidateAfter: 3m
    budgets:
    - nodes: "10%"
      reasons:
      - "Underutilized"
      - "Empty"
