apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: YOUR_CLUSTER_NAME/grafana-admin
        property: username
    - secretKey: admin-password
      remoteRef:
        key: YOUR_CLUSTER_NAME/grafana-admin
        property: password
