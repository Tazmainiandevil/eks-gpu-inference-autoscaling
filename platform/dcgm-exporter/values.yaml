# DCGM Exporter — NVIDIA GPU metrics for Prometheus/Grafana.
# Only scheduled on GPU nodes via affinity + toleration matching the Karpenter GPU NodePool.
# Metrics exposed: GPU utilization %, memory used/free, temperature, SM clock, power draw.

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: workload-type
          operator: In
          values:
          - gpu

tolerations:
  - key: gpu
    value: "true"
    effect: NoSchedule

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 15s
  honorLabels: true

# Subset of DCGM fields — covers utilization, memory, temperature, and clock speed.
# Full field list: https://docs.nvidia.com/datacenter/dcgm/latest/dcgm-user-guide/feature-overview.html
arguments:
  - "--collectors=DCGM_FI_DEV_GPU_UTIL,DCGM_FI_DEV_FB_USED,DCGM_FI_DEV_FB_FREE,DCGM_FI_DEV_GPU_TEMP,DCGM_FI_DEV_SM_CLOCK,DCGM_FI_DEV_POWER_USAGE"
