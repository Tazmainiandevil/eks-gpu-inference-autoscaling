apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: inference-pod-vpa
  namespace: inference
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-pod
  updatePolicy:
    # Off = recommendations only. Do NOT use Auto when KEDA manages replicas via HPA —
    # VPA Auto will evict and restart pods to resize them, conflicting with KEDA scale events.
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: "100m"
          memory: "128Mi"
        maxAllowed:
          cpu: "4"
          memory: "8Gi"
