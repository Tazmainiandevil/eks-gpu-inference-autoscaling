apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay for the inference workload — GPU mode.
# Uses the base GPU config (affinity, tolerations, nvidia.com/gpu request) unchanged.
# Adjusts ScaledObject: keeps cron trigger for business-hours pre-warm,
# raises maxReplica to 20 to match staging load expectations.

resources:
  - ../../../apps/inference

images:
  - name: REGISTRY_PLACEHOLDER/inference-stub
    newName: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_AWS_REGION.amazonaws.com/inference-stub
    newTag: latest

patches:
  - target:
      kind: ScaledObject
      name: inference-scaler
    patch: |
      - op: replace
        path: /spec/maxReplicaCount
        value: 20
