# Staging environment overrides for Karpenter
# - Single replica, but longer consolidation window
# - Mix of ON_DEMAND + Spot (more stable than dev)
# - 1 baseline GPU node for warm pool
replicaCount: 1

settings:
  clusterName: YOUR_CLUSTER_NAME-staging
  # IAM wired via EKS Pod Identity — no serviceAccount annotation needed.
  # Queue name matches aws_sqs_queue.karpenter_interruption in Terraform: {cluster_name}-spot-interruption
  interruptionQueue: YOUR_CLUSTER_NAME-staging-spot-interruption
