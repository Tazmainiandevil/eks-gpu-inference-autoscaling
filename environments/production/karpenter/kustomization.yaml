apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for Karpenter NodePool and EC2NodeClass.
# Patches cluster-specific values to match production.tfvars (cluster_name = YOUR_CLUSTER_NAME-prod).
# consolidateAfter: 2h — preserve warm nodes to avoid expensive 40GB re-pulls.

resources:
  - ../../../platform/karpenter

patches:
  # EC2NodeClass: set the node IAM role and discovery selectors for this cluster.
  - patch: |-
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      metadata:
        name: default
      spec:
        role: "YOUR_CLUSTER_NAME-prod-gpu-node-role"
        subnetSelectorTerms:
          - tags:
              karpenter.sh/discovery: YOUR_CLUSTER_NAME-prod
        securityGroupSelectorTerms:
          - tags:
              kubernetes.io/cluster/YOUR_CLUSTER_NAME-prod: owned

  # GPU NodePool: add p4de.24xlarge for 80GB VRAM burst capacity (40GB model serving).
  # p5/p5en (H100) not available in eu-west-2 — require us-east-1/us-west-2 region change.
  - patch: |-
      - op: replace
        path: /spec/template/spec/requirements/1/values
        value: ["g4dn.xlarge", "g4dn.2xlarge", "g5.xlarge", "g5.2xlarge", "g6.xlarge", "g6.2xlarge", "p4de.24xlarge"]
    target:
      kind: NodePool
      name: gpu

  # NodePools: 2-hour consolidation window.
  - patch: |-
      - op: replace
        path: /spec/disruption/consolidateAfter
        value: 2h
    target:
      kind: NodePool
      name: gpu
  - patch: |-
      - op: replace
        path: /spec/disruption/consolidateAfter
        value: 2h
    target:
      kind: NodePool
      name: general
