apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for the inference workload — GPU mode, HA.
# Raises minReplicaCount to 2 (always two pods for HA) and maxReplicaCount to 30.
# PDB (minAvailable: 1) from the base remains active — meaningful with minReplica >= 2.
# Cron pre-warm trigger active; threshold kept at 5 (scale quickly on any queue growth).

resources:
  - ../../../apps/inference

images:
  - name: REGISTRY_PLACEHOLDER/inference-stub
    newName: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_AWS_REGION.amazonaws.com/inference-stub
    newTag: latest

patches:
  - target:
      kind: ScaledObject
      name: inference-scaler
    patch: |
      - op: replace
        path: /spec/minReplicaCount
        value: 2
      - op: replace
        path: /spec/maxReplicaCount
        value: 30
